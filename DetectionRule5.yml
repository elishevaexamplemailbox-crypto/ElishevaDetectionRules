name: "BEC: Executive Impersonation with Financial or Social Engineering Intent"
description: "Detects inbound emails where the sender display name matches a known organizational executive but originates from an external domain, contains no links or attachments, and NLU classifies the intent as BEC, extortion, or job scam. Indicative of CEO fraud, wire transfer scams, and social engineering attacks that bypass technical controls entirely."
type: "rule"
severity: "high"
source: |
    type.inbound

       //the senders display name matches a VIP in the org
        and any($org_vips,
            strings.icontains(sender.email.email, .email))

        //no links and no attachments
        and length (body.links) == 0
        and length (attachments) == 0

        //ML analyzes the text based content to look at intent for BEC, Extortion, or   Job Scam 
        and any([body.plain.raw, body.html.inner_text], 
                any(ml.nlu_classifier(.).intents,
                    .name in ("bec", "extortion", "job_scam") and .confidence == "high"
             )    
        )
